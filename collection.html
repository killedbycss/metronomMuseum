<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>метроном музей</title>
    <link rel="stylesheet" href="stylesheets/style.css" />
    <script defer src="javascripts/script.js"></script>
    <link rel="icon" href="contents/meta/icon.ico" />
    <link rel="stylesheet" href="contents/meta/icon.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="метроном музей" />
    <meta
      property="og:description"
      content="Специальный проект, посвященный истории метрополитена и общества, которое вокруг него"
    />
    <meta
      property="og:image"
      content="https://raw.githubusercontent.com/killedbycss/metronomMuseum/refs/heads/main/contents/meta/banner.png"
    />
    <meta property="og:image:width" content="1920" />
    <meta property="og:image:height" content="1080" />
    <meta
      property="og:url"
      content="https://killedbycss.github.io/metronomMuseum/"
    />
  </head>
  <body>
    <header>
      <div class="logo">
        <h4 class="logoPart">м</h4>
        <h4 class="logoPart" id="rotated">м</h4>
      </div>
      <h1>коллекция</h1>
      <svg
        class="arrow"
        width="9"
        height="19"
        viewBox="0 0 9 19"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M1.5 17.2734L6.50612 8.60248C6.95872 7.81855 6.82836 6.82836 6.18828 6.18828L1.5 1.5"
          stroke="black"
          stroke-opacity="0.5"
          stroke-width="3"
          stroke-linecap="round"
        />
      </svg>
    </header>
    <nav>
      <div class="row" id="menuRow">
        <div class="col" id="menuCol">
          <button id="history">
            <h3>история</h3>
            <h4>отправьтесь в&nbsp;путешествие по&nbsp;линиям метро</h4>
          </button>
          <button id="quiz">
            <h3>квизы</h3>
          </button>
          <button id="about">
            <h3>о проекте</h3>
          </button>
        </div>
        <div class="col" id="menuCol">
          <button id="store">
            <h3>магазин</h3>
            <h4>тематические товары и&nbsp;стикерпаки</h4>
          </button>
          <button id="collection">
            <h3>коллекция</h3>
            <h4>в&nbsp;разработке</h4>
          </button>
        </div>
      </div>
    </nav> 
  </body>
</html>
